# Example configuration file for corsarotrace with the subnetasn plugin

# A unique identifier for this capture location.
# This is used in the output filename: <monitorid>_<timestamp>_subnetasn.csv.gz
monitorid: merit-nt

# The interval length, in seconds. At the end of each interval, the /24 subnets
# seen during that hour will be written to a compressed CSV file.
# Hourly intervals (3600s) are recommended for this plugin.
interval: 3600

packetsource: PCAPURI

threads: 1

libtimeseriesbackends:
 - kafka:
    # The host and port that the Kafka brokers are running on
    brokeruri: "gaiola.cc.gatech.edu:9092,cirella.cc.gatech.edu:9092,procida.cc.gatech.edu:9092"

    # The name of the channel to publish to
    channelname: "darknet.merit-nt.subnetasn"

    # Compression codec to use, e.g. "snappy", "lz4", "gzip", "uncompressed"
    compresscodec: "snappy"

    # Kafka output format to use (either "ascii" or "tsk")
    format: "ascii"

    # The topic to publish to
    topicprefix: "tsk-production.graphite"


# List of analysis plugins to run and their plugin-specific config options.
plugins:
  - subnetasn:
       # The libipmeta provider to use for ASN lookups.
       # Default is "pfx2as".
       asn_provider: "pfx2as"
       output_format: "libtimeseries"
       output_row_label: "merit"

       #output_dir: "/home/salcock/subnetasn_test/"

       # Arguments for the ASN provider.
       # For pfx2as, this is typically the path to the prefix-to-AS mapping file.
       # Example:
       # asn_provider_args: "-f /path/to/pfx2as.gz"
       asn_provider_args: "-f http://api.grip.inetintel.cc.gatech.edu/datasupport/routeviews-rv2-latest.pfx2as.gz"
